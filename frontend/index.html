<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="RSTUF TUF Metadata Visualizer — Interactive dashboard for exploring Repository Service for TUF metadata, signing keys, delegation trees, and artifact integrity.">
  <meta name="theme-color" content="#ffffff">
  <title>RSTUF Metadata Visualizer — TUF Repository Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23475569' stroke-width='2'><path d='M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z'/></svg>">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="app-container">

    <!-- ===== TOPBAR ===== -->
    <header class="topbar" role="banner">
      <div class="topbar-brand">
        <h1 class="topbar-title">RSTUF Metadata Visualizer</h1>
      </div>

      <span class="topbar-divider" aria-hidden="true"></span>

      <div class="topbar-meta">
        <span class="health-badge health-badge--loading" id="overall-health-badge" aria-live="polite">
          <span class="health-badge__dot"></span>Loading…
        </span>

        <span class="server-url" id="server-url-display" aria-label="Connected server">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/>
          </svg>
          <span id="server-url-text">—</span>
        </span>

        <button class="btn-refresh" id="refresh-btn" aria-label="Refresh all metadata" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
          </svg>
          Refresh
        </button>
      </div>
    </header>

    <!-- ===== HEALTH CARDS ===== -->
    <section class="health-cards" aria-label="Metadata health status">
      <article class="glass-card health-card" id="health-card-root" aria-label="Root metadata health">
        <div class="skeleton skeleton-line skeleton-line--short"></div>
        <div class="skeleton skeleton-line skeleton-line--long"></div>
        <div class="skeleton skeleton-line skeleton-line--medium"></div>
      </article>
      <article class="glass-card health-card" id="health-card-targets" aria-label="Targets metadata health">
        <div class="skeleton skeleton-line skeleton-line--short"></div>
        <div class="skeleton skeleton-line skeleton-line--long"></div>
        <div class="skeleton skeleton-line skeleton-line--medium"></div>
      </article>
      <article class="glass-card health-card" id="health-card-snapshot" aria-label="Snapshot metadata health">
        <div class="skeleton skeleton-line skeleton-line--short"></div>
        <div class="skeleton skeleton-line skeleton-line--long"></div>
        <div class="skeleton skeleton-line skeleton-line--medium"></div>
      </article>
      <article class="glass-card health-card" id="health-card-timestamp" aria-label="Timestamp metadata health">
        <div class="skeleton skeleton-line skeleton-line--short"></div>
        <div class="skeleton skeleton-line skeleton-line--long"></div>
        <div class="skeleton skeleton-line skeleton-line--medium"></div>
      </article>
    </section>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content" role="main">

      <!-- LEFT: Delegation Tree -->
      <aside class="glass-card tree-panel" aria-label="Delegation tree">
        <div class="tree-panel__title">
          Delegation Tree
        </div>
        <nav id="delegation-tree" aria-label="TUF delegation hierarchy">
          <!-- Tree rendered by JS -->
          <div style="padding: 8px 0">
            <div class="skeleton skeleton-line skeleton-line--medium"></div>
            <div style="padding-left:20px">
              <div class="skeleton skeleton-line skeleton-line--long" style="margin-top:8px"></div>
              <div style="padding-left:16px">
                <div class="skeleton skeleton-line skeleton-line--short" style="margin-top:6px"></div>
                <div class="skeleton skeleton-line skeleton-line--short" style="margin-top:6px"></div>
                <div class="skeleton skeleton-line skeleton-line--short" style="margin-top:6px"></div>
                <div class="skeleton skeleton-line skeleton-line--short" style="margin-top:6px"></div>
              </div>
            </div>
            <div class="skeleton skeleton-line skeleton-line--medium" style="margin-top:8px"></div>
            <div class="skeleton skeleton-line skeleton-line--medium" style="margin-top:8px"></div>
          </div>
        </nav>
      </aside>

      <!-- RIGHT: Detail Panel -->
      <section class="glass-card detail-panel" id="detail-panel" aria-label="Role details" aria-live="polite">
        <div class="detail-panel__header">
          <div class="detail-panel__role-info">
            <div class="detail-panel__role-name" id="detail-role-name">Select a role</div>
            <div class="detail-panel__role-subtitle" id="detail-role-subtitle">Click a node in the tree to view its details</div>
          </div>
        </div>
        <div class="detail-panel__content" id="detail-panel-content">
          <div class="empty-state" id="detail-empty-state">
            <div class="empty-state__text">Loading metadata…</div>
            <div class="empty-state__sub">Connecting to the RSTUF server</div>
          </div>
        </div>
      </section>

    </main>

  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="scripts/api.js"></script>
  <script src="scripts/dashboard.js"></script>
  <script src="scripts/tree.js"></script>
  <script src="scripts/details.js"></script>

  <script>
    /* ============================================================
       RSTUF TUF Metadata Visualizer — Main Application Controller
       ============================================================ */
    (function () {
      'use strict';

      let _overviewData = null;
      let _currentRole = null;
      let _isLoading = false;

      /**
       * Initialize the application on DOM ready.
       */
      document.addEventListener('DOMContentLoaded', () => {
        // Display server URL
        const urlText = document.getElementById('server-url-text');
        if (urlText) {
          urlText.textContent = window.location.origin;
        }

        // Wire up refresh button
        const refreshBtn = document.getElementById('refresh-btn');
        if (refreshBtn) {
          refreshBtn.addEventListener('click', handleRefresh);
        }

        // Initial load
        loadEverything();
      });

      /**
       * Load all data: overview + auto-select root.
       */
      async function loadEverything() {
        if (_isLoading) return;
        _isLoading = true;

        // Show skeletons
        TUFDashboard.renderHealthCardsSkeleton();
        TUFTree.renderTreeSkeleton();
        TUFDetails.renderDetailSkeleton();

        try {
          _overviewData = await TUFApi.fetchOverview();

          // Render health cards
          TUFDashboard.renderHealthCards(_overviewData);

          // Start timestamp countdown
          if (_overviewData.timestamp && _overviewData.timestamp.expires) {
            TUFDashboard.startTimestampCountdown(_overviewData.timestamp.expires);
          }

          // Render delegation tree
          TUFTree.renderDelegationTree(_overviewData, handleRoleSelect);

          // Auto-select root
          await handleRoleSelect('root');

        } catch (err) {
          console.error('Failed to load overview:', err);
          renderGlobalError(err.message || 'Could not connect to the RSTUF server.');
        } finally {
          _isLoading = false;
        }
      }

      /**
       * Handle role selection from the tree.
       */
      async function handleRoleSelect(roleName) {
        if (!roleName) return;
        _currentRole = roleName;

        TUFTree.selectTreeNode(roleName);
        TUFDetails.renderDetailSkeleton();

        try {
          const details = await TUFApi.fetchDetails(roleName);
          // Only render if we're still on the same role (user didn't click elsewhere)
          if (_currentRole === roleName) {
            TUFDetails.renderDetailPanel(details);
          }
        } catch (err) {
          console.error(`Failed to load details for ${roleName}:`, err);
          if (_currentRole === roleName) {
            TUFDetails.renderDetailError(err.message);

            // Wire retry button
            const retryBtn = document.getElementById('detail-retry-btn');
            if (retryBtn) {
              retryBtn.addEventListener('click', () => handleRoleSelect(roleName));
            }
          }
        }
      }

      /**
       * Handle refresh button click.
       */
      async function handleRefresh() {
        const btn = document.getElementById('refresh-btn');
        if (btn) {
          btn.classList.add('is-spinning');
          btn.disabled = true;
        }

        TUFDashboard.stopTimestampCountdown();
        await loadEverything();

        if (btn) {
          // Keep spinning for a beat so the animation looks intentional
          setTimeout(() => {
            btn.classList.remove('is-spinning');
            btn.disabled = false;
          }, 400);
        }
      }

      /**
       * Render a global error state when the overview fails.
       */
      function renderGlobalError(message) {
        // Health badge
        const badge = document.getElementById('overall-health-badge');
        if (badge) {
          badge.className = 'health-badge health-badge--critical';
          badge.innerHTML = '<span class="health-badge__dot"></span>Unreachable';
        }

        // Health cards
        const cardIds = ['health-card-root', 'health-card-targets', 'health-card-snapshot', 'health-card-timestamp'];
        for (const id of cardIds) {
          const el = document.getElementById(id);
          if (el) {
            el.innerHTML = `
              <div class="error-state" style="padding:var(--space-md);min-height:auto">
                <div style="font-size:0.82rem;color:var(--text-muted)">Unable to load</div>
              </div>
            `;
          }
        }

        // Tree
        const tree = document.getElementById('delegation-tree');
        if (tree) {
          tree.innerHTML = `
            <div class="error-state" style="padding:var(--space-lg)">
              <div class="error-state__icon" style="width:36px;height:36px">${TUFDetails.ICONS.wifiOff}</div>
              <div class="error-state__message" style="font-size:0.82rem">${message}</div>
            </div>
          `;
        }

        // Detail panel
        TUFDetails.renderDetailError(message);
        const retryBtn = document.getElementById('detail-retry-btn');
        if (retryBtn) {
          retryBtn.addEventListener('click', () => {
            TUFDashboard.stopTimestampCountdown();
            loadEverything();
          });
        }
      }

      // Expose for use by detail panel (delegation item clicks)
      window.TUFApp = {
        loadRoleDetails: handleRoleSelect,
      };
    })();
  </script>
</body>
</html>
